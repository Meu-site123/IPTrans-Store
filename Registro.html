<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Registro | TechStore</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="assets/css/elemento.css">
        <link rel="shortcut icon" href="assets/images/FavIcon.png" type="image/x-icon">
    <link rel="stylesheet" href="assets/css/bootstrap.min.css">

</head>
<body class="register-page">
    <div class="register-container">
        <div class="register-form-wrapper">
            <div class="form-container">
                <div class="form-header">
                    <h1 class="form-title">Criar Conta</h1>
                    <p>Faça Parte da Equipa da IP - TRANS.</p>
                </div>

                <form id="registerForm">
                    <div class="form-row">
                        <div class="form-group half">
                            <label class="form-label">Nome</label>
                            <input type="text" class="form-input" style="padding-left: 1rem;" placeholder="Nome">
                        </div>
                        <div class="form-group half">
                            <label class="form-label">Sobrenome</label>
                            <input type="text" class="form-input" style="padding-left: 1rem;" placeholder="Sobrenome">
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">E-mail</label>
                        <div class="input-wrapper">
                            <i class="fas fa-envelope input-icon"></i>
                            <input type="email" class="form-input" placeholder="seu@email.com" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Senha</label>
                        <div class="input-wrapper">
                            <i class="fas fa-lock input-icon"></i>
                            <input type="password" class="form-input" id="passwordInput" placeholder="Crie uma senha" required>
                        </div>
                      
                    </div>

                    <label class="checkbox-label full">
                        <input type="checkbox" required> Eu aceito os Termos e Condições.
                    </label>

        <button class="btn-register"> <a href="index.html">CRIAR CONTA</a></button>
        </a>

            </form>
            <br>
                <div class="form-footer">
                    Já é membro? <a href="login.html" class="link-register">Faça Login</a>
                </div>
            </div>
        </div>

        <div class="register-panel right-panel">
            <div class="panel-content">
                <h2 class="panel-title">Junte-se a Nós!</h2>
                <p class="panel-text">No IPTrans contam ainda com apoios financeiros à frequência do curso, uns definidos pelo Ministério da Educação, outros decididos pela Escola, em função das suas possibilidades financeiras.</p>
            </div>
        </div>
    </div>
</body>
</html>
